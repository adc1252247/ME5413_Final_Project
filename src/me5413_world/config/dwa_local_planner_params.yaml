DWAPlannerROS:
  # Robot Configuration Parameters
  acc_lim_th: 3.2
  acc_lim_x: 2.5
  acc_lim_y: 2.5

  max_vel_x: 0.55
  max_vel_y: 0.0
  min_vel_x: -0.55
  min_vel_theta: -1.0
  max_vel_theta: 1.0

  # Goal Tolerance Parameters
  yaw_goal_tolerance: 0.1
  xy_goal_tolerance: 0.1

  # Forward Simulation Parameters
  sim_time: 3.0
  sim_granularity: 0.025
  vx_samples: 20
  vy_samples: 0
  vtheta_samples: 40

  # Trajectory Scoring Parameters
  path_distance_bias: 20.0
  goal_distance_bias: 28.0
  occdist_scale: 0.5
  forward_point_distance: 0.5
  stop_time_buffer: 0.2
  scaling_speed: 0.25
  max_scaling_factor: 0.9

  # Oscillation Prevention Parameters
  oscillation_reset_dist: 0.15

  # Global Plan Association Parameters
  prune_plan: true
