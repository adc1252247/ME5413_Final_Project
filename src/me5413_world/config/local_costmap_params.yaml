local_costmap:
  global_frame: odom
  robot_base_frame: base_link
  update_rate: 10.0
  publish_frequency: 2.0
  static_map: false
  rolling_window: true
  width: 6.0
  height: 6.0
  resolution: 0.05
  
  plugins:
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}
    
  obstacle_layer:
    observation_sources: laser
    laser: {sensor_frame: front_laser, data_type: LaserScan, topic: front/scan, marking: true, clearing: true}
    
  inflation_layer:
    inflation_radius: 0.8
    cost_scaling_factor: 10.0
