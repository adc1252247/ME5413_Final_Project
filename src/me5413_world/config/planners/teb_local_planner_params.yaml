TebLocalPlannerROS:
  # Trajectory
  teb_autosize: True
  dt_ref: 0.3
  dt_hysteresis: 0.1
  max_samples: 500
  global_plan_overwrite_orientation: True
  allow_init_with_backwards_motion: True
  max_global_plan_lookahead_dist: 1.5
  global_plan_viapoint_sep: -1
  global_plan_prune_distance: 1
  exact_arc_length: False
  feasibility_check_no_poses: 2
  publish_feedback: False
    
  # Robot
  max_vel_x: 1.0
  max_vel_x_backwards: 0.5
  max_vel_y: 0.0          # Must be 0 for differential drive Jackal
  max_vel_theta: 1.0 
  acc_lim_x: 2.5
  acc_lim_theta: 3.2
  min_turning_radius: 0.0 # 0 for differential drive
  footprint_model: # types: "point", "circular", "two_circles", "line", "polygon"
    type: "polygon"
    vertices: [[-0.21, -0.165], [-0.21, 0.165], [0.21, 0.165], [0.21, -0.165]]

  # GoalTolerance
  xy_goal_tolerance: 0.2
  yaw_goal_tolerance: 0.1
  free_goal_vel: False
  complete_global_plan: True
    
  # Obstacles
  min_obstacle_dist: 0.5 # How far to stay away from walls
  inflation_dist: 0.8
  include_costmap_obstacles: True
  costmap_obstacles_behind_robot_dist: 1.0
  obstacle_poses_affected: 15
  include_dynamic_obstacles: True

  # Optimization weight parameters
  weight_max_vel_x: 2
  weight_max_vel_theta: 1
  weight_acc_lim_x: 1
  weight_acc_lim_theta: 1
  weight_kinematics_nh: 1000  # High weight for non-holonomic (Jackal)
  weight_kinematics_forward_drive: 1
  weight_kinematics_turning_radius: 1
  weight_optimaltime: 1 
  weight_obstacle: 70
  weight_inflation: 0.5       
  weight_dynamic_obstacle: 10
